# PyPI Trusted Publisher: repo=emitfy/emitfy-python, workflow=publish.yml
# Só publica se o SDK mudou vs latest no PyPI.
name: Publish PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Should publish?
        id: decide
        run: |
          set +e
          node scripts/should-publish.mjs
          code=$?
          set -e
          if [ "$code" -eq 10 ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$code" -ne 0 ]; then
            exit "$code"
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.decide.outputs.publish == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build
        if: steps.decide.outputs.publish == 'true'
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        if: steps.decide.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Skipped
        if: steps.decide.outputs.publish != 'true'
        run: echo "Nenhuma alteração no SDK Python — publish ignorado."
